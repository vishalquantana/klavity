<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Klavity — DNA logo animation</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Hanken+Grotesk:wght@400..700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0b0b0f; --bg2:#14141b;
    --ink:#f4f4f6; --dim:#8a8a96;
    --line:#1f1f29;
    --glow:#eef0ff;
  }
  html,body{height:100%}
  body{
    background:radial-gradient(120% 90% at 50% 18%, #15151e 0%, var(--bg) 60%, #070709 100%);
    color:var(--ink);
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; gap:30px; overflow:hidden;
  }
  .stage{
    position:relative; width:340px; height:420px;
    display:grid; place-items:center;
  }
  canvas{display:block}
  .lockup{
    display:flex; align-items:center; gap:14px;
    opacity:0; transform:translateY(8px);
    animation:rise 1s ease forwards 3.4s;
  }
  .word{
    font-family:'Fraunces',serif; font-weight:600; font-size:34px;
    letter-spacing:-.02em; color:var(--ink);
  }
  .word .dot{color:#9aa0ff}
  .eyebrow{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.34em;
    text-transform:uppercase; color:var(--dim);
    opacity:0; animation:fade 1.2s ease forwards 3.7s;
  }
  .controls{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%);
    display:flex; gap:10px; opacity:0; animation:fade 1s ease forwards 4s;
  }
  button{
    font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.08em;
    color:var(--dim); background:rgba(255,255,255,.04);
    border:1px solid var(--line); border-radius:999px;
    padding:9px 18px; cursor:pointer; transition:.18s;
  }
  button:hover{color:var(--ink); border-color:#34343f; background:rgba(255,255,255,.07)}
  button:focus-visible{outline:2px solid #6b6bff; outline-offset:2px}
  @keyframes rise{to{opacity:1; transform:translateY(0)}}
  @keyframes fade{to{opacity:1}}
  @media (prefers-reduced-motion: reduce){
    .lockup,.eyebrow,.controls{animation-duration:.001ms !important}
  }
</style>
</head>
<body>
  <div class="eyebrow">Klavity · genome of every bug</div>
  <div class="stage"><canvas id="dna" width="680" height="840"></canvas></div>
  <div class="lockup">
    <span class="word">Klavi<span class="dot">t</span>y</span>
  </div>
  <div class="controls"><button id="replay">↻ replay</button></div>

<script>
(() => {
  const canvas = document.getElementById('dna');
  const ctx = canvas.getContext('2d');
  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  // logical size
  const W = 340, H = 420;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.scale(DPR, DPR);

  const CX = W / 2, CY = H / 2;
  const N = 26;            // nucleotide pairs along the strand
  const COILS = 2.15;      // number of half-twists top→bottom
  const RADIUS = 58;       // helix radius (horizontal swing)
  const FULL_HALF = 168;   // half of the full vertical extent

  // ── timeline (ms) ───────────────────────────────────────────
  const T = {
    dotsIn:   0,      // dots fade into place
    curve:    1100,   // backbones sweep through the dots
    connect:  2050,   // base-pair rungs link the strands
    spin:     2750,   // continuous 3D rotation engages
    extend:   2900,   // helix grows up & down to full height
  };
  const easeOut = t => 1 - Math.pow(1 - t, 3);
  const easeInOut = t => t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
  const clamp01 = t => t < 0 ? 0 : t > 1 ? 1 : t;

  let start = null;
  let raf = null;

  function node(i, half, phase) {
    const f = N === 1 ? 0 : i / (N - 1);   // 0..1 top→bottom
    const yN = (f - 0.5) * 2;              // -1..1
    const ang = yN * COILS * Math.PI + phase;
    return { yN, ang, y: CY + yN * half };
  }

  function draw(now) {
    if (start === null) start = now;
    const e = now - start;

    ctx.clearRect(0, 0, W, H);

    // ── phase progresses ──────────────────────────────────────
    const pSpin   = e > T.spin ? (e - T.spin) / 1000 : 0;      // seconds spinning
    const spinEase = easeInOut(clamp01((e - T.spin) / 1400));  // spin ramps up
    const phase   = pSpin * 1.9 * spinEase + (1 - spinEase) * 0;

    const extendT = easeInOut(clamp01((e - T.extend) / 1300));
    const half    = (0.18 + 0.82 * extendT) * FULL_HALF;        // grows from a seed

    // gentle perpetual breathing once fully extended
    const breathe = extendT >= 1 ? Math.sin((e - T.extend) / 1100) * 6 : 0;
    const halfNow = half + breathe;

    // build both strands' nodes with depth
    const items = [];
    for (let i = 0; i < N; i++) {
      const a = node(i, halfNow, phase);          // strand A
      const b = node(i, halfNow, phase + Math.PI);  // strand B
      const ax = CX + RADIUS * Math.sin(a.ang);
      const az = Math.cos(a.ang);                 // -1 (back) .. 1 (front)
      const bx = CX + RADIUS * Math.sin(b.ang);
      const bz = Math.cos(b.ang);

      // per-node intro stagger for the dots
      const dotsT = easeOut(clamp01((e - T.dotsIn - i * 26) / 520));

      items.push({ i, ax, ay: a.y, az, bx, by: b.y, bz, dotsT });
    }

    // ── 1 & 2: backbone curves sweep in ───────────────────────
    const curveT = easeOut(clamp01((e - T.curve) / 950));
    if (curveT > 0) {
      drawBackbone(items, 'a', curveT, phase);
      drawBackbone(items, 'b', curveT, phase);
    }

    // ── 3: connecting rungs (base pairs) ──────────────────────
    const connT = clamp01((e - T.connect) / 900);
    if (connT > 0) {
      for (const it of items) {
        const local = easeOut(clamp01(connT * N - it.i * 0.55));
        if (local <= 0) continue;
        const zMid = (it.az + it.bz) / 2;
        const depth = (zMid + 1) / 2;                 // 0..1
        const alpha = (0.16 + depth * 0.5) * local;
        ctx.strokeStyle = `rgba(150,156,255,${alpha})`;
        ctx.lineWidth = 0.8 + depth * 1.4;
        const mx1 = it.ax + (it.bx - it.ax) * (0.5 - 0.5 * local);
        const mx2 = it.ax + (it.bx - it.ax) * (0.5 + 0.5 * local);
        ctx.beginPath();
        ctx.moveTo(mx1, it.ay + (it.by - it.ay) * (0.5 - 0.5 * local));
        ctx.lineTo(mx2, it.by + (it.ay - it.by) * (0.5 - 0.5 * local));
        ctx.stroke();
      }
    }

    // ── 0: nucleotide dots, depth-sorted so strands cross over ─
    const dots = [];
    for (const it of items) {
      dots.push({ x: it.ax, y: it.ay, z: it.az, t: it.dotsT, strand: 0 });
      dots.push({ x: it.bx, y: it.by, z: it.bz, t: it.dotsT, strand: 1 });
    }
    dots.sort((p, q) => p.z - q.z); // back to front

    for (const d of dots) {
      if (d.t <= 0) continue;
      const depth = (d.z + 1) / 2;                    // 0 back .. 1 front
      const r = (1.6 + depth * 3.4) * d.t;
      const alpha = (0.28 + depth * 0.72) * d.t;
      // glow
      const g = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, r * 3.4);
      const tint = d.strand ? '154,160,255' : '238,240,255';
      g.addColorStop(0, `rgba(${tint},${alpha})`);
      g.addColorStop(1, `rgba(${tint},0)`);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(d.x, d.y, r * 3.4, 0, Math.PI * 2);
      ctx.fill();
      // core
      ctx.fillStyle = `rgba(${tint},${Math.min(1, alpha + 0.15)})`;
      ctx.beginPath();
      ctx.arc(d.x, d.y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    raf = requestAnimationFrame(draw);
  }

  function drawBackbone(items, key, progress, phase) {
    // progressive reveal of the strand polyline, with depth shading
    const pts = items.map(it => ({
      x: it[key + 'x'], y: it[key + 'y'], z: it[key + 'z']
    }));
    const reveal = progress * (N - 1);
    for (let i = 0; i < N - 1; i++) {
      if (i > reveal) break;
      const seg = clamp01(reveal - i);
      const p0 = pts[i], p1 = pts[i + 1];
      const depth = ((p0.z + p1.z) / 2 + 1) / 2;
      ctx.strokeStyle = `rgba(${key === 'a' ? '238,240,255' : '150,156,255'},${(0.12 + depth * 0.55)})`;
      ctx.lineWidth = 1 + depth * 2.4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p0.x + (p1.x - p0.x) * seg, p0.y + (p1.y - p0.y) * seg);
      ctx.stroke();
    }
  }

  function play() {
    cancelAnimationFrame(raf);
    start = null;
    raf = requestAnimationFrame(draw);
  }

  document.getElementById('replay').addEventListener('click', play);
  play();
})();
</script>
</body>
</html>
