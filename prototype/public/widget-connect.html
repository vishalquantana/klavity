<!DOCTYPE html><html lang="en"><head><meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Connect to Klavity</title>
<style>
  body{font-family:system-ui,sans-serif;background:#19140f;color:#f5f3ee;margin:0;
    display:grid;place-items:center;min-height:100vh}
  .card{width:320px;padding:28px;text-align:center}
  h1{font-size:18px;margin:0 0 6px}.sub{color:#8a8076;font-size:13px;margin:0 0 18px}
  input{width:100%;box-sizing:border-box;background:#15110d;border:1px solid #574f45;
    border-radius:10px;padding:11px;color:#f5f3ee;font-size:15px;margin-bottom:10px}
  button{width:100%;border:0;border-radius:10px;padding:11px;background:#6366f1;color:#fff;
    font-size:15px;font-weight:600;cursor:pointer}
  .err{color:#db2777;font-size:13px;min-height:1em;margin-top:8px}
  .ok{color:#34d399;font-size:13px;min-height:1em;margin-top:8px}
  .links{display:flex;justify-content:space-between;gap:8px;margin-top:12px}
  .link{width:auto;background:none;color:#a59beb;font-size:13px;font-weight:500;
    padding:4px 2px;cursor:pointer}
  .link:disabled{color:#6b6358;cursor:default}
  .hide{display:none}
</style></head><body>
<div class="card">
  <h1>Connect to Klavity</h1>
  <p class="sub" id="sub">Sign in to bring your Sims onto this page.</p>
  <div id="emailStep">
    <input id="email" type="email" placeholder="you@acme.com" autocomplete="email" />
    <button id="sendBtn">Send sign-in code</button>
  </div>
  <div id="codeStep" class="hide">
    <input id="code" inputmode="numeric" maxlength="6" placeholder="6-digit code" />
    <button id="verifyBtn">Verify &amp; connect</button>
    <div class="links">
      <button type="button" class="link" id="resendBtn">Resend code</button>
      <button type="button" class="link" id="changeBtn">Change email</button>
    </div>
  </div>
  <div id="addStep" class="hide">
    <button id="addBtn">Add this site &amp; connect</button>
  </div>
  <div class="ok" id="ok"></div>
  <div class="err" id="err"></div>
</div>
<script src="/otp-input.js"></script>
<script>
const qs = new URLSearchParams(location.search)
const projectId = qs.get("project") || ""
const targetOrigin = qs.get("origin") || ""
const $ = (id) => document.getElementById(id)
const err = (m) => { $("err").textContent = m || ""; if (m) $("ok").textContent = "" }
const ok = (m) => { $("ok").textContent = m || ""; if (m) $("err").textContent = "" }
async function jf(url, opts){ const r = await fetch(url, opts); let d={}; try{d=await r.json()}catch(e){} return {ok:r.ok,status:r.status,data:d} }

// Send (or resend) a sign-in code for the given email. Returns the response data
// ({ emailed, testOtp, ... }) on success, or null on failure. Callers inspect the flags:
//   testOtp:true  → KLAV_TEST_OTP mode, no email sent, fixed test code entered directly
//   emailed:false → the code could not be sent (don't dead-end the user on a code field)
async function requestCode(email){
  const r = await jf("/api/auth/request", { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ email }) })
  if (!r.ok){ err(r.data.error || "Could not send a code."); return null }
  return r.data || {}
}

// Reveal the code step for an email. In test-OTP mode no email is sent, so say so rather than
// claiming "we sent a code to …" (which left testers waiting for an email that never arrives).
function showCodeStep(email, testOtp){
  $("sub").textContent = testOtp
    ? "Test mode — no email sent. Enter your test sign-in code to continue."
    : "Enter the code we sent to " + email + "."
  $("emailStep").classList.add("hide"); $("codeStep").classList.remove("hide")
  $("code").value = ""; $("code").focus()
}

async function mintAndFinish(){
  const r = await jf("/api/widget/token", { method:"POST", headers:{"content-type":"application/json"},
    body: JSON.stringify({ projectId, origin: targetOrigin }) })
  if (!r.ok){
    // Admin on a not-yet-watched site → offer to add it right here instead of dead-ending.
    if (r.data && r.data.code === "origin_not_allowed" && r.data.canAdd && r.data.host){ showAddOrigin(r.data.host); return }
    err(r.data.error || "Could not connect."); return
  }
  if (window.opener && targetOrigin){
    window.opener.postMessage({ type:"klavity-widget-token", token:r.data.token, projectId }, targetOrigin)
  }
  $("sub").textContent = "Connected — you can close this window."
  $("emailStep").classList.add("hide"); $("codeStep").classList.add("hide"); $("addStep").classList.add("hide")
  setTimeout(() => window.close(), 600)
}

// This site isn't on the project's watch list yet. The signed-in admin can add it (host-only pattern,
// via the same admin-gated endpoint the dashboard uses) and we retry the token mint automatically.
let pendingHost = ""
function showAddOrigin(host){
  pendingHost = host
  $("sub").textContent = host + " isn't on this project's watch list yet — add it so your Sims can review here?"
  $("emailStep").classList.add("hide"); $("codeStep").classList.add("hide"); $("addStep").classList.remove("hide")
  $("addBtn").textContent = "Add " + host + " & connect"
  $("addBtn").disabled = false
}
$("addBtn").onclick = async () => {
  if (!pendingHost) return
  err(""); ok("Adding " + pendingHost + "…"); $("addBtn").disabled = true
  const a = await jf("/api/projects/" + encodeURIComponent(projectId) + "/monitored-urls",
    { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ urlPattern: pendingHost }) })
  if (!a.ok){ err(a.data.error || "Could not add this site."); $("addBtn").disabled = false; return }
  ok(""); await mintAndFinish()
}
$("sendBtn").onclick = async () => {
  err(""); const email = $("email").value.trim().toLowerCase()
  if (!email.includes("@")) return err("Enter a valid email.")
  // If already signed in, /api/widget/token will succeed straight away.
  const probe = await jf("/api/widget/token", { method:"POST", headers:{"content-type":"application/json"},
    body: JSON.stringify({ projectId, origin: targetOrigin }) })
  if (probe.ok){ if (window.opener && targetOrigin) window.opener.postMessage({type:"klavity-widget-token",token:probe.data.token,projectId}, targetOrigin); $("sub").textContent="Connected — you can close this window."; $("emailStep").classList.add("hide"); setTimeout(()=>window.close(),600); return }
  // Already signed in, but this site isn't watched yet → let an admin add it without an extra OTP round-trip.
  if (probe.data && probe.data.code === "origin_not_allowed" && probe.data.canAdd && probe.data.host){ showAddOrigin(probe.data.host); return }
  const data = await requestCode(email)
  if (!data) return
  // Genuine send failure (not test-OTP) — don't strand the user on a code field.
  if (!data.testOtp && data.emailed === false) return err("We couldn't send your code right now. Please try again.")
  showCodeStep(email, !!data.testOtp); otp.startResendCooldown()
}
$("changeBtn").onclick = () => {
  err(""); ok(""); otp.stopResendCooldown(); pendingHost = ""
  $("codeStep").classList.add("hide"); $("addStep").classList.add("hide"); $("emailStep").classList.remove("hide")
  $("sub").textContent = "Sign in to bring your Sims onto this page."
  $("email").focus(); $("email").select()
}

// Verify the entered code. Shared by the Verify button and the OTP helper (auto-submit / Enter).
async function verifyNow(){
  err(""); const email = $("email").value.trim().toLowerCase(); const code = $("code").value.trim()
  if (code.length < 4) return err("Enter the 6-digit code.")
  const r = await jf("/api/auth/verify", { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ email, code }) })
  if (!r.ok) return err(r.data.error || "Invalid or expired code.")
  await mintAndFinish()
}
$("verifyBtn").onclick = verifyNow

// Unified OTP input UX (sanitise, paste-to-fill, auto-submit, Enter) + resend cooldown.
const otp = window.KlavityOTP.mount({
  input: $("code"),
  length: 6,
  onComplete: verifyNow,
  errorEl: $("err"),
  resend: {
    el: $("resendBtn"),
    cooldownSecs: 30,
    onResend: async () => {
      err(""); const email = $("email").value.trim().toLowerCase()
      if (!email.includes("@")) { err("Enter a valid email."); return false }
      const data = await requestCode(email)
      if (!data) return false
      if (!data.testOtp && data.emailed === false) { err("We couldn't send your code right now. Please try again."); return false }
      ok(data.testOtp ? "Test mode — enter your test sign-in code." : "New code sent to " + email + ".")
      return true
    },
  },
})
</script></body></html>
