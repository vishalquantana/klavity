<link rel="icon" href="/favicon.ico" sizes="any">
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Walk · AutoSims · Klavity</title>

<style>
:root{--ink:#f5f3ee;--ink-2:#ffffff;--ink-3:#efeae0;--paper:#19140f;--paper-dim:#574f45;--paper-faint:#8a8076;--indigo:#6366f1;--indigo-deep:#4f46e5;--amber:#d98324;--rose:#db2777;--green:#0f9d6b;--line:rgba(25,20,15,.12);
--display:'Fraunces',serif;--body:'Hanken Grotesk',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
--mi-ease:cubic-bezier(.2,.7,.3,1);--mi-dur:.15s}
[data-theme="dark"]{--ink:#0c0a08;--ink-2:#15110d;--ink-3:#1e1813;--paper:#f3ece1;--paper-dim:#b3a896;--paper-faint:#776c5d;--indigo:#8b8bf5;--indigo-deep:#6366f1;--amber:#e8a24a;--rose:#e8849a;--green:#9fd6a0;--line:rgba(243,236,225,.11)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ink);color:var(--paper);font-family:var(--body);min-height:100vh}
body::after{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(80% 50% at 50% -5%,rgba(139,139,245,.08),transparent 60%)}
a{color:inherit;text-decoration:none}
.bar{position:sticky;top:0;z-index:10;backdrop-filter:blur(12px);background:var(--ink-2);border-bottom:1px solid var(--line)}
.bar-in{max-width:1280px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;gap:14px}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:600;font-size:20px;letter-spacing:-.02em}
.nav{margin-left:8px;display:flex;gap:4px}
.nav a{font-size:13px;color:var(--paper-faint);padding:6px 11px;border-radius:9px}
.nav a:hover{color:var(--paper-dim)}.nav a.on{color:var(--paper);background:var(--ink-3)}
.right{margin-left:auto;display:flex;align-items:center;gap:14px}
.who{font-size:13px;color:var(--paper-dim)}
.lo{font-size:13px;color:var(--paper-faint);cursor:pointer;background:none;border:none;font-family:var(--body)}.lo:hover{color:var(--paper-dim)}

.wrap{max-width:1280px;margin:0 auto;padding:28px 24px}

/* breadcrumb */
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--paper-faint);margin-bottom:20px;flex-wrap:wrap}
.breadcrumb a{color:var(--paper-faint)}.breadcrumb a:hover{color:var(--paper-dim)}
.breadcrumb .sep{color:var(--line)}

/* walk header */
.whead{display:flex;align-items:flex-start;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.whead-body{flex:1;min-width:0}
.whead h1{font-family:var(--display);font-weight:450;font-size:28px;letter-spacing:-.02em;margin-bottom:4px;line-height:1.2}
.whead .wmeta{font-family:var(--mono);font-size:12px;color:var(--paper-faint);display:flex;gap:14px;flex-wrap:wrap;margin-top:6px}
.whead-acts{display:flex;gap:8px;align-items:center;flex-shrink:0}

.pill{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:5px 11px;border-radius:20px;flex-shrink:0}
.pill.green{background:rgba(15,157,107,.16);color:var(--green)}
.pill.amber{background:rgba(217,131,36,.18);color:var(--amber)}
.pill.red{background:rgba(219,39,119,.16);color:var(--rose)}
.pill.running,.pill.skip{background:var(--ink-3);color:var(--paper-faint)}

.btn{font-family:var(--body);font-weight:600;font-size:13px;padding:8px 14px;border-radius:9px;border:1px solid var(--line);background:var(--ink-2);color:var(--paper);cursor:pointer;transition:border-color var(--mi-dur) var(--mi-ease),transform var(--mi-dur) var(--mi-ease)}
.btn:hover{border-color:var(--indigo)}
.btn:active{transform:scale(.97)}
.btn-sm{font-size:12px;padding:5px 11px}

/* two-column layout */
.layout{display:grid;grid-template-columns:260px minmax(0,1fr);gap:22px;align-items:start}
@media(max-width:900px){.layout{grid-template-columns:minmax(0,1fr)}}

/* steps sidebar */
.sidebar{background:var(--ink-2);border:1px solid var(--line);border-radius:16px;padding:18px;position:sticky;top:82px;max-height:calc(100vh - 100px);overflow-y:auto}
.sidebar h2{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--paper-faint);margin-bottom:14px}
.step-list{display:flex;flex-direction:column;gap:6px}
.step-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:background var(--mi-dur) var(--mi-ease)}
.step-item:hover{background:var(--ink-3)}
.step-item.on{background:var(--ink-3);outline:1px solid var(--indigo)}
.step-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--paper-faint)}
.step-dot.green{background:var(--green)}.step-dot.amber{background:var(--amber)}.step-dot.red{background:var(--rose)}
.step-txt{font-family:var(--mono);font-size:11px;color:var(--paper-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.step-idx{font-family:var(--mono);font-size:10px;color:var(--paper-faint);flex-shrink:0}

/* main content */
.main{}

/* replay area */
.replay-section{background:var(--ink-2);border:1px solid var(--line);border-radius:18px;padding:20px;margin-bottom:22px}
.replay-section h2{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--paper-faint);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.chapters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.chapters .ch{font-family:var(--mono);font-size:10px;padding:5px 11px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--paper-faint);cursor:pointer;transition:border-color var(--mi-dur) var(--mi-ease),color var(--mi-dur) var(--mi-ease),background var(--mi-dur) var(--mi-ease)}
.chapters .ch.on{color:var(--paper);border-color:var(--indigo);background:var(--ink-3)}
#playerHost{border-radius:12px;overflow:hidden;min-height:240px;width:100%;background:var(--ink)}
.rnote{font-family:var(--mono);font-size:12px;color:var(--paper-faint);margin-top:10px}
/* replay player controls */
.rpl-ctrl{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--ink-3);border:1px solid var(--line);border-top:none;border-radius:0 0 12px 12px}
.rpl-pp{background:none;border:1px solid var(--line);color:var(--paper);border-radius:7px;width:32px;height:32px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color var(--mi-dur) var(--mi-ease)}
.rpl-pp:hover{border-color:var(--indigo)}
.rpl-scrub{flex:1;accent-color:var(--indigo);cursor:pointer;height:4px}
.rpl-time{font-family:var(--mono);font-size:10px;color:var(--paper-faint);white-space:nowrap;min-width:88px;text-align:right}
.rpl-spd{background:var(--ink);border:1px solid var(--line);color:var(--paper);border-radius:6px;font-family:var(--mono);font-size:11px;padding:3px 5px;cursor:pointer}

/* no-replay placeholder */
.no-replay{text-align:center;padding:48px 24px;color:var(--paper-faint)}
.no-replay svg{margin-bottom:14px;opacity:.5}
.no-replay p{font-size:14px;line-height:1.5}

/* step detail */
.step-detail{background:var(--ink-2);border:1px solid var(--line);border-radius:16px;padding:20px}
.step-detail h2{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--paper-faint);margin-bottom:14px}
.step-card{background:var(--ink);border:1px solid var(--line);border-radius:12px;padding:14px}
.step-card + .step-card{margin-top:10px}
.step-card .sr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.step-card .si{font-family:var(--mono);font-size:10px;color:var(--paper-faint)}
.step-card .sv{font-family:var(--mono);font-size:10px}
.step-card .sv.green{color:var(--green)}.step-card .sv.amber{color:var(--amber)}.step-card .sv.red{color:var(--rose)}
.step-card .sconf{font-family:var(--mono);font-size:10px;color:var(--paper-faint);margin-left:auto}
.step-card .srat{font-size:13.5px;line-height:1.5;color:var(--paper-dim)}
.step-card .srat:not(:first-child){margin-top:8px}
.step-card .sdiff{font-family:var(--mono);font-size:11px;color:var(--paper-faint);background:var(--ink-3);padding:7px 10px;border-radius:8px;margin-top:8px;overflow-x:auto}
.step-card .sshot{max-width:100%;border-radius:8px;margin-top:10px;border:1px solid var(--line);display:block}

/* live view */
.live-frame{width:100%;border-radius:12px;border:1px solid var(--line);background:var(--ink);min-height:240px;object-fit:contain;display:block}
.live-note{font-family:var(--mono);font-size:12px;color:var(--paper-faint);margin-top:8px}

/* findings */
.finding{border:1px solid var(--line);border-radius:12px;padding:14px;background:var(--ink);margin-top:12px}
.finding .ftop{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.finding .fkind{font-family:var(--mono);font-size:10px;text-transform:uppercase;color:var(--indigo)}
.finding .fstatus{font-family:var(--mono);font-size:10px;color:var(--paper-faint);margin-left:auto}
.finding .ftitle{font-weight:700;margin-bottom:4px}
.finding .fquote,.finding .fdetail{font-size:13px;line-height:1.45;color:var(--paper-dim)}
.finding .fdiff{font-family:var(--mono);font-size:11px;color:var(--paper-faint);background:var(--ink-3);border-radius:8px;padding:7px;margin-top:8px;overflow-x:auto}
.finding .frow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center}
.finding .fmsg{font-size:12px;color:var(--paper-faint)}

/* judgment */
.judgment{background:var(--ink);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:4px}
.judgment .jpersona{font-family:var(--mono);font-size:11px;color:var(--paper-faint);margin-bottom:10px}
.judgment .jnote{font-size:13.5px;line-height:1.5;color:var(--paper-dim);margin-bottom:10px}
.judgment .jrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.judgment .jverdict{font-family:var(--mono);font-size:11px;padding:4px 9px;border-radius:20px;background:var(--ink-3)}
.judgment .jverdict.valid{background:rgba(15,157,107,.16);color:var(--green)}
.judgment .jverdict.false_positive{background:rgba(219,39,119,.16);color:var(--rose)}
.judgment .jverdict.clarify{background:rgba(217,131,36,.18);color:var(--amber)}
.judgment .jprompt{font-size:13px;color:var(--paper-faint);line-height:1.5}
/* judge controls (picker + trigger) */
.judge-controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}
.judge-pick-label{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--paper-faint)}
.judge-select{font-family:var(--body);font-size:12px;padding:5px 10px;border-radius:9px;border:1px solid var(--line);background:var(--ink);color:var(--paper);cursor:pointer;transition:border-color var(--mi-dur) var(--mi-ease),transform var(--mi-dur) var(--mi-ease)}
.judge-select:hover{border-color:var(--indigo)}
.judge-select:focus{outline:none;border-color:var(--indigo)}
.judge-msg{font-size:12px;color:var(--paper-faint)}

/* add-bug form */
.bug-form{display:grid;gap:8px}
.bug-form input,.bug-form textarea{width:100%;border:1px solid var(--line);border-radius:9px;background:var(--ink);color:var(--paper);font:inherit;padding:9px 12px;font-size:13px}
.bug-form textarea{min-height:80px;resize:vertical}

/* section card */
.section-card{background:var(--ink-2);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:22px}
.section-card h2{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--paper-faint);margin-bottom:14px}
.empty{color:var(--paper-faint);font-size:14px;padding:8px 0}

/* share dialog overlay */
.share-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:flex;align-items:center;justify-content:center}
.share-box{background:var(--ink-2);border:1px solid var(--line);border-radius:16px;padding:24px;max-width:520px;width:90%;display:flex;flex-direction:column;gap:12px}
.share-box h3{font-family:var(--display);font-size:20px;font-weight:450;margin:0}
.share-url{width:100%;border:1px solid var(--line);border-radius:8px;background:var(--ink);color:var(--paper);font-family:var(--mono);font-size:12px;padding:9px 12px;word-break:break-all}
.share-acts{display:flex;gap:8px}
</style>
<script src="/icons.generated.js"></script>
</head>
<body>
<div class="bar"><div class="bar-in">
  <a class="brand" href="/dashboard"><img src="/favicon.svg" width="28" height="28" alt="Klavity" style="border-radius:8px;display:block"/>Klavity</a>
  <nav class="nav">
    <a href="/dashboard">Dashboard</a>
    <a href="/autosims" class="on">AutoSims</a>
  </nav>
  <div class="right">
    <span class="who" id="who"></span>
    <button class="lo" id="logout">Log out</button>
  </div>
</div></div>

<div class="wrap">
  <div class="breadcrumb" id="breadcrumb">
    <a href="/autosims">AutoSims</a>
    <span class="sep">/</span>
    <a href="/autosims/walks" id="bcWalks">All Walks</a>
    <span class="sep">/</span>
    <span id="bcCurrent">…</span>
  </div>

  <div class="whead" id="whead">
    <div class="whead-body">
      <h1 id="walkTitle">Loading…</h1>
      <div class="wmeta" id="walkMeta"></div>
    </div>
    <div class="whead-acts" id="wheadActs"></div>
  </div>

  <div class="layout">
    <!-- Left: steps sidebar -->
    <div class="sidebar" id="sidebar">
      <h2>Steps</h2>
      <div class="step-list" id="stepList"><div style="font-size:13px;color:var(--paper-faint)">Loading…</div></div>
    </div>

    <!-- Right: live view + replay + findings + judgment + step detail -->
    <div class="main">
      <div class="section-card" id="liveSection" style="display:none">
        <h2>Live View</h2>
        <img id="liveFrame" class="live-frame" alt="Live browser frame"/>
        <div class="live-note" id="liveNote">Connecting…</div>
      </div>

      <div class="replay-section" id="replaySection">
        <h2 id="replayH2">Session Replay</h2>
        <div id="replayBody">
          <div style="font-size:13px;color:var(--paper-faint);padding:24px 0;text-align:center">Loading…</div>
        </div>
      </div>

      <div class="section-card" id="findingsSection">
        <h2>Findings</h2>
        <div id="findingsBody"><div class="empty">Loading…</div></div>
      </div>

      <div class="section-card" id="judgmentSection" style="display:none">
        <h2>Persona Judgment</h2>
        <div class="judge-controls" id="judgeControls" style="display:none">
          <label class="judge-pick-label" for="judgePersona">Judge voice</label>
          <select id="judgePersona" class="judge-select"></select>
          <button class="btn btn-sm" id="judgeBtn" type="button"></button>
          <span id="judgeMsg" class="judge-msg"></span>
        </div>
        <div id="judgmentBody"></div>
      </div>

      <div class="section-card">
        <h2>Add a Bug</h2>
        <form class="bug-form" id="bugForm">
          <input id="bugTitle" maxlength="160" placeholder="Bug title"/>
          <textarea id="bugDetail" maxlength="2000" placeholder="What happened? (optional)"></textarea>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn btn-sm" type="submit">Add bug</button>
            <span id="bugMsg" style="font-size:12px;color:var(--paper-faint)"></span>
          </div>
        </form>
      </div>

      <div class="step-detail" id="stepDetail" style="display:none">
        <h2 id="stepDetailH2">Step Detail</h2>
        <div id="stepDetailBody"></div>
      </div>
    </div>
  </div>
</div>

<div class="share-overlay" id="shareOverlay" style="display:none">
  <div class="share-box">
    <h3>Share Walk</h3>
    <p style="font-size:13px;color:var(--paper-faint);margin:0">This link lets anyone view the walk report for 30 days (no login required).</p>
    <div class="share-url" id="shareUrl"></div>
    <div class="share-acts">
      <button class="btn btn-sm" id="shareCopy">Copy link</button>
      <button class="btn btn-sm" id="shareClose">Close</button>
    </div>
    <div id="shareMsg" style="font-size:12px;color:var(--paper-faint)"></div>
  </div>
</div>
<script>
function $(id){return document.getElementById(id)}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]||c})}
function projParam(){try{return new URLSearchParams(location.search).get("project")}catch(e){return null}}
function projQ(){var p=projParam();return p?"?project="+encodeURIComponent(p):""}

// Walk ID from path: /autosims/walk/:id
var walkId = location.pathname.replace(/^\/autosims\/walk\//,"").split("?")[0]

$("logout").onclick = async function(){ await fetch("/api/auth/logout",{method:"POST"}); location.href="/" }

// ── rrweb lazy loader (same fix as trails.html: bypass broken rrweb-player v2 Svelte wrapper) ──
var _rrwebReady = null
function ensureRrweb(){
  if(_rrwebReady) return _rrwebReady
  _rrwebReady = new Promise(function(resolve,reject){
    if(window.rrweb && window.rrweb.Replayer){resolve();return}
    var s=document.createElement("script");s.src="/vendor/klv-buffer.min.js"
    s.onload=function(){resolve()};s.onerror=function(){reject(new Error("rrweb load failed"))}
    document.head.appendChild(s)
  })
  return _rrwebReady
}

var replayState = { segments:[], steps:[], player:null, activeChapter:-1 }

function destroyPlayer(){
  try{if(replayState.player){
    if(typeof replayState.player.pause==="function") replayState.player.pause()
    if(typeof replayState.player.$destroy==="function") replayState.player.$destroy()
  }}catch(e){}
  replayState.player=null
  var h=$("playerHost");if(h){h.innerHTML="";h.style.borderRadius=""}
  var c=document.getElementById("rplCtrl");if(c) c.remove()
}

function attachPlayerControls(replayer,host){
  var meta={};try{meta=replayer.getMetaData()}catch(e){}
  var totalMs=(meta&&meta.totalTime)||60000;
  var playing=true,scrubbing=false,rafId=null;
  function fmt(ms){var s=Math.floor(Math.max(0,ms)/1000);return Math.floor(s/60)+":"+("0"+(s%60)).slice(-2)}
  var ctrl=document.createElement("div");ctrl.id="rplCtrl";ctrl.className="rpl-ctrl";
  ctrl.innerHTML='<button class="rpl-pp" id="rplPP">'+window.kicon("pause",{size:12})+'</button>'
    +'<input class="rpl-scrub" id="rplScrub" type="range" min="0" max="'+Math.ceil(totalMs)+'" value="0" step="500"/>'
    +'<span class="rpl-time" id="rplTime">0:00 / '+fmt(totalMs)+'</span>'
    +'<select class="rpl-spd" id="rplSpd"><option value="0.5">0.5x</option>'
    +'<option value="1" selected>1x</option><option value="2">2x</option>'
    +'<option value="4">4x</option></select>';
  host.insertAdjacentElement("afterend",ctrl);
  host.style.borderRadius="12px 12px 0 0";
  var pp=document.getElementById("rplPP"),sc=document.getElementById("rplScrub");
  var ti=document.getElementById("rplTime"),sp=document.getElementById("rplSpd");
  function stopTick(){if(rafId){cancelAnimationFrame(rafId);rafId=null}}
  function tick(){
    if(!scrubbing){var cur=0;try{cur=replayer.getCurrentTime()}catch(e){}
      sc.value=Math.min(cur,totalMs);ti.textContent=fmt(cur)+" / "+fmt(totalMs)}
    if(playing) rafId=requestAnimationFrame(tick)
  }
  try{replayer.on("finish",function(){playing=false;pp.innerHTML=window.kicon("play",{size:12});stopTick()})}catch(e){}
  pp.onclick=function(){
    if(playing){try{replayer.pause()}catch(e){}playing=false;pp.innerHTML=window.kicon("play",{size:12});stopTick()}
    else{var t=0;try{t=Number(sc.value)}catch(e){}try{replayer.play(t)}catch(e){}playing=true;pp.innerHTML=window.kicon("pause",{size:12});rafId=requestAnimationFrame(tick)}
  };
  sc.addEventListener("mousedown",function(){scrubbing=true;try{replayer.pause()}catch(e){}stopTick()});
  sc.addEventListener("touchstart",function(){scrubbing=true;try{replayer.pause()}catch(e){}stopTick()},{passive:true});
  sc.addEventListener("input",function(){ti.textContent=fmt(Number(sc.value))+" / "+fmt(totalMs)});
  function onScrubEnd(){if(!scrubbing)return;scrubbing=false;var t=Number(sc.value);try{replayer.play(t)}catch(e){}playing=true;pp.innerHTML=window.kicon("pause",{size:12});rafId=requestAnimationFrame(tick)}
  sc.addEventListener("mouseup",onScrubEnd);sc.addEventListener("touchend",onScrubEnd);
  sp.addEventListener("change",function(){try{replayer.setConfig({speed:Number(sp.value)})}catch(e){}});
  rafId=requestAnimationFrame(tick);
  // Scale recording to fit container: rrweb records at ~1280px; host may be ~740px
  setTimeout(function(){
    var wrapper=host.querySelector(".replayer-wrapper"),iframe=host.querySelector("iframe");
    if(!wrapper||!iframe)return;
    var iw=iframe.offsetWidth,hw=host.offsetWidth;
    if(iw>0&&hw>0&&iw>hw){var ratio=hw/iw;wrapper.style.transformOrigin="top left";wrapper.style.transform="scale("+ratio+")";host.style.height=Math.round(iframe.offsetHeight*ratio)+"px"}
  },300)
}

function playChapter(i){
  var seg=replayState.segments[i];if(!seg) return
  destroyPlayer()
  replayState.activeChapter=i
  // highlight tab
  document.querySelectorAll(".ch").forEach(function(t,idx){t.classList.toggle("on",idx===i)})
  var events=(seg.events||[]).slice()
  if(events.length<2){$("rnote").textContent="Chapter "+(i+1)+": too few frames recorded.";return}
  try{
    var Replayer=window.rrweb && window.rrweb.Replayer
    if(!Replayer) throw new Error("rrweb.Replayer not available")
    var host=$("playerHost")
    var replayer=new Replayer(events,{root:host,skipInactive:true,showWarning:false,showDebug:false,mouseTail:true})
    replayState.player=replayer
    replayer.play()
    $("rnote").textContent="Chapter "+(i+1)+" of "+replayState.segments.length+" \xb7 "+(seg.url||"")
    attachPlayerControls(replayer,host)
  }catch(e){
    $("rnote").textContent="Could not play this chapter."
  }
}

async function loadReplay(){
  var pid=projParam()
  var qs=pid?"?project="+encodeURIComponent(pid):""
  try { await ensureRrweb() } catch(e) { /* non-fatal */ }
  var r
  try{r=await fetch("/api/trails/walks/"+encodeURIComponent(walkId)+"/replay"+qs)}
  catch(e){showNoReplay("Network error loading replay.");return}
  if(r.status===404){showNoReplay("No replay was recorded for this Walk.");return}
  if(!r.ok){showNoReplay("Could not load replay.");return}
  var d=await r.json()
  replayState.segments=d.segments||[]
  if(!replayState.segments.length){showNoReplay("No segments in replay data.");return}

  // Build chapter tabs
  var rb=$("replayBody")
  var chapHTML='<div class="chapters" id="replayChapters">'
  replayState.segments.forEach(function(seg,i){
    var name=String(seg.url||"").split("/").pop()||("page "+(i+1))
    chapHTML+='<button class="ch" data-ci="'+i+'">'+(i+1)+'. '+esc(name)+'</button>'
  })
  chapHTML+='</div><div id="playerHost"></div><div class="rnote" id="rnote"></div>'
  rb.innerHTML=chapHTML
  document.querySelectorAll("button[data-ci]").forEach(function(btn){
    btn.onclick=function(){playChapter(parseInt(btn.getAttribute("data-ci"),10))}
  })

  // Find first failing chapter (amber/red step → seek to that chapter)
  var firstBadSeg=0
  if(replayState.steps && replayState.steps.length){
    var badStep=replayState.steps.find(function(s){var v=String(s.verdict);return v==="amber"||v==="red"})
    if(badStep){
      // Find the last segment whose step idx <= badStep.idx
      for(var i=0;i<replayState.segments.length;i++){if(replayState.segments[i].idx<=badStep.idx) firstBadSeg=i}
    }
  }
  playChapter(firstBadSeg)
}

function showNoReplay(msg){
  $("replayBody").innerHTML='<div class="no-replay">'
    +window.kicon("monitor-x",{size:32})
    +'<p>'+esc(msg)+'</p></div>'
}

// ── Live View SSE (authenticated) ──
var _liveEs=null
function startLive(runId,qs){
  if(_liveEs) return
  $("liveSection").style.display=""
  try{
    _liveEs=new EventSource("/api/trails/walks/"+encodeURIComponent(runId)+"/live"+qs)
    _liveEs.onmessage=function(ev){try{var f=JSON.parse(ev.data);if(f.dataUrl){$("liveFrame").src=f.dataUrl;$("liveNote").textContent="Live"}}catch(e){}}
    _liveEs.addEventListener("end",function(ev){$("liveNote").textContent=ev.data||"ended";try{_liveEs.close()}catch(e){}})
    _liveEs.onerror=function(){$("liveNote").textContent="Live view unavailable."}
  }catch(e){$("liveNote").textContent="Live view unavailable."}
}

// ── Findings ──
function findingHtml(f,qs){
  var ev=f.evidence||{}, rationale=ev.rationale||f.groundQuote||ev.detail||"", canAct=f.status==="queued"
  var v=String(f.status||"")
  var html='<div class="finding" data-finding="'+esc(f.id)+'">'
    +'<div class="ftop"><span class="fkind">'+esc(f.kind)+'</span><span class="fstatus">'+esc(f.status)+'</span></div>'
    +'<div class="ftitle">'+esc(f.title)+'</div>'
  if(rationale)html+='<div class="fquote">'+esc(rationale)+'</div>'
  if(ev.fromSelector||ev.toSelector)html+='<div class="fdiff">'+esc(ev.fromSelector||"(none)")+window.kicon("chevron-right",{size:9})+' '+esc(ev.toSelector||"(none)")+'</div>'
  html+='<div class="frow">'
  if(canAct){
    html+='<button class="btn btn-sm" style="background:var(--indigo);border-color:var(--indigo);color:white" data-fact="file" data-fid="'+esc(f.id)+'" data-fqs="'+esc(qs)+'">'+window.kicon("send",12)+' Accept</button>'
    html+='<button class="btn btn-sm" data-fact="dismiss" data-fid="'+esc(f.id)+'" data-fqs="'+esc(qs)+'">'+window.kicon("x",12)+' Dismiss</button>'
  }
  if(f.connectorRef)html+='<span class="fmsg">Filed: '+esc(f.connectorRef)+'</span>'
  if(f.connectorError)html+='<span class="fmsg" style="color:var(--rose)">File failed: '+esc(f.connectorError)+'</span>'
  html+='</div><div class="fmsg" data-fmsg="'+esc(f.id)+'"></div>'
  html+='</div>'
  return html
}
function renderFindings(findings,qs){
  var el=$("findingsBody")
  if(!findings||!findings.length){el.innerHTML='<div class="empty">No findings for this walk.</div>';return}
  el.innerHTML=findings.map(function(f){return findingHtml(f,qs)}).join("")
  el.querySelectorAll("[data-fact]").forEach(function(b){
    b.onclick=function(){actFinding(b.getAttribute("data-fact"),b.getAttribute("data-fid"),b,b.getAttribute("data-fqs")||"")}
  })
}
async function actFinding(action,id,btn,qs){
  var msg=document.querySelector('[data-fmsg="'+id+'"]');btn.disabled=true;if(msg)msg.textContent=""
  try{
    var ep="/api/trails/findings/"+encodeURIComponent(id)+(action==="file"?"/file":"/dismiss")
    var r=await fetch(ep,{method:"POST",headers:{"content-type":"application/json"},body:"{}"})
    var d=await r.json().catch(function(){return {}})
    if(r.ok&&d.ok){await load();return}
    if(msg){msg.style.color="var(--rose)";msg.textContent=d.error||"Action failed."}
  }catch(e){if(msg){msg.style.color="var(--rose)";msg.textContent="Network error."}}
  finally{btn.disabled=false}
}

// ── Judgment ──
// KLA-73 / JTBD 7.6: the client-voiced verdict. The card renders an existing judgment; the controls
// let the agency pick which Sim voices the verdict (persisted via PATCH /judge-persona) and trigger a
// judgment on demand (POST /judge) without a page reload. Hidden while a walk is still running.
var _judgePersonas=[]
function renderJudgment(j){
  var walk=(walkData&&walkData.walk)||{}
  var trail=(walkData&&walkData.trail)||null
  var terminal=String(walk.status||"running")!=="running"
  var section=$("judgmentSection"),controls=$("judgeControls")
  // Running walks: hide the whole section (no judging mid-flight).
  if(!terminal){section.style.display="none";return}
  section.style.display=""
  // Populate the judge-persona picker + trigger button (only when we have a trail to attach to).
  if(trail){
    controls.style.display=""
    renderJudgePicker(trail)
  } else {
    controls.style.display="none"
  }
  var body=$("judgmentBody")
  if(!j){
    body.innerHTML='<div class="judgment"><div class="jprompt">No persona has judged this walk yet. '
      +'Pick a Sim voice above and run “Judge this walk” to translate the step log into client language.</div></div>'
    return
  }
  var html='<div class="judgment">'
    +'<div class="jpersona">Judged by <b>'+esc(j.personaName)+'</b></div>'
  if(j.overallNote)html+='<div class="jnote">'+esc(j.overallNote)+'</div>'
  if(j.verdicts&&j.verdicts.length){
    html+='<div class="jrow">'
    j.verdicts.forEach(function(v){
      html+='<span class="jverdict '+esc(v.verdict)+'">'+esc(String(v.verdict).replace("_"," "))+'</span>'
    })
    html+='</div>'
  }
  html+='</div>'
  body.innerHTML=html
}

function renderJudgePicker(trail){
  var sel=$("judgePersona"),btn=$("judgeBtn"),msg=$("judgeMsg")
  var current=trail.judgePersonaId||""
  var opts='<option value="">— choose a Sim —</option>'
  _judgePersonas.forEach(function(p){
    opts+='<option value="'+esc(p.id)+'"'+(p.id===current?' selected':'')+'>'+esc(p.name)+(p.role?' · '+esc(p.role):'')+'</option>'
  })
  sel.innerHTML=opts
  if(!_judgePersonas.length){
    sel.disabled=true;btn.disabled=true
    btn.textContent="Judge this walk"
    msg.style.color="var(--paper-faint)";msg.textContent="Add a Sim to this project to judge walks."
    return
  }
  sel.disabled=false;btn.disabled=false;msg.textContent=""
  btn.innerHTML=window.kicon("sparkles",{size:12})+' Judge this walk'
  // Persist the chosen judge persona onto the Trail so scheduled/next judgments reuse it.
  sel.onchange=function(){saveJudgePersona(trail.id,sel.value)}
  btn.onclick=function(){runJudge(trail)}
}

async function loadJudgePersonas(){
  try{
    var r=await fetch("/api/personas"+projQ())
    if(!r.ok)return
    var d=await r.json().catch(function(){return {}})
    _judgePersonas=Array.isArray(d.personas)?d.personas:[]
  }catch(e){}
}

async function saveJudgePersona(trailId,personaId){
  var msg=$("judgeMsg")
  msg.style.color="var(--paper-faint)";msg.textContent="Saving…"
  try{
    var r=await fetch("/api/trails/"+encodeURIComponent(trailId)+"/judge-persona"+projQ(),
      {method:"PATCH",headers:{"content-type":"application/json"},body:JSON.stringify({personaId:personaId||null})})
    var d=await r.json().catch(function(){return {}})
    if(r.ok&&d.ok){
      if(walkData&&walkData.trail)walkData.trail.judgePersonaId=personaId||null
      msg.style.color="var(--green)";msg.textContent="Judge voice saved."
    } else {
      msg.style.color="var(--rose)";msg.textContent=d.error||"Could not save."
    }
  }catch(e){msg.style.color="var(--rose)";msg.textContent="Network error."}
}

var _judging=false
async function runJudge(trail){
  if(_judging)return
  var sel=$("judgePersona"),btn=$("judgeBtn"),msg=$("judgeMsg")
  var personaId=sel.value||trail.judgePersonaId||""
  if(!personaId){msg.style.color="var(--rose)";msg.textContent="Pick a Sim voice first.";return}
  _judging=true;btn.disabled=true;sel.disabled=true
  msg.style.color="var(--paper-faint)";msg.textContent="Judging… the Sim is reading the walk."
  try{
    var r=await fetch("/api/trails/walks/"+encodeURIComponent(walkId)+"/judge"+projQ(),
      {method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({personaId:personaId})})
    var d=await r.json().catch(function(){return {}})
    if(r.ok&&d.judgment){
      if(walkData)walkData.judgment=d.judgment
      msg.style.color="var(--green)";msg.textContent="Verdict ready."
      renderJudgment(d.judgment)
    } else {
      msg.style.color="var(--rose)";msg.textContent=d.error||"Could not judge this walk."
    }
  }catch(e){msg.style.color="var(--rose)";msg.textContent="Network error."}
  finally{_judging=false;btn.disabled=false;sel.disabled=false}
}

// ── Share ──

  var overlay=$("shareOverlay"),urlEl=$("shareUrl"),msg=$("shareMsg")
  overlay.style.display="flex";urlEl.textContent="Generating…";msg.textContent=""
  try{
    var r=await fetch("/api/trails/walks/"+encodeURIComponent(runId)+"/share",{method:"POST",headers:{"content-type":"application/json"},body:"{}"})
    var d=await r.json().catch(function(){return {}})
    if(r.ok&&d.url){urlEl.textContent=d.url}
    else{msg.style.color="var(--rose)";msg.textContent=d.error||"Could not create share link.";urlEl.textContent=""}

document.addEventListener("DOMContentLoaded",function(){
  var copyBtn=$("shareCopy"),closeBtn=$("shareClose"),overlay=$("shareOverlay")
  if(copyBtn)copyBtn.onclick=function(){var t=$("shareUrl").textContent;if(t&&t.startsWith("http")){navigator.clipboard.writeText(t).then(function(){$("shareMsg").style.color="var(--green)";$("shareMsg").textContent="Copied!"}).catch(function(){})}}
  if(closeBtn)closeBtn.onclick=function(){overlay.style.display="none"}

// ── Cancel ──
async function handleCancel(runId,qs){
  if(!confirm("Cancel this walk? It will stop at the next step boundary."))return
  try{
    var r=await fetch("/api/trails/walks/"+encodeURIComponent(runId)+"/cancel",{method:"POST",headers:{"content-type":"application/json"},body:"{}"})
    var d=await r.json().catch(function(){return {}})
    if(r.ok){await load()}
    else{alert(d.error||"Cancel failed.")}

}

document.addEventListener("DOMContentLoaded",function(){

// ── Walk data ──
var walkData=null

async function load(){
  var pid=projParam()
  var qs=pid?"?project="+encodeURIComponent(pid):""

  // Load session info for nav
  try{
    var sr=await fetch("/api/dashboard"+qs)
    if(sr.status===401){location.href="/login";return}
    var sd=await sr.json()
    $("who").textContent=sd.email||""
    // Breadcrumb: carry project param
    if(pid){
      $("bcWalks").href="/autosims/walks?project="+encodeURIComponent(pid)
    }
  }catch(e){}

  // Load walk detail
  var r
  try{r=await fetch("/api/trails/walks/"+encodeURIComponent(walkId)+qs)}
  catch(e){$("walkTitle").textContent="Network error loading walk.";return}
  if(r.status===401){location.href="/login";return}
  if(!r.ok){$("walkTitle").textContent="Walk not found.";return}

  var d=await r.json()
  walkData=d
  var walk=d.walk||{}
  var trail=d.trail
  var steps=d.steps||[]

  // Title
  document.title=(trail?trail.name:"Walk")+" · AutoSims · Klavity"
  $("walkTitle").textContent=trail?trail.name:walk.trailId
  $("bcCurrent").textContent=walkId.slice(0,12)+"…"

  // Meta
  var v=String(walk.status||"running")
  var when=walk.startedAt?new Date(walk.startedAt).toLocaleString():""
  var dur=""
  if(walk.startedAt && walk.finishedAt){
    var secs=Math.round((walk.finishedAt-walk.startedAt)/1000)
    dur=secs<60?secs+"s":Math.round(secs/60)+"m "+secs%60+"s"
  }
  $("walkMeta").innerHTML='<span>ID: '+esc(walkId)+'</span>'
    +(when?'<span>'+esc(when)+'</span>':"")
    +(dur?'<span>'+esc(dur)+'</span>':"")
    +(walk.llmCalls?'<span>'+esc(walk.llmCalls)+' LLM calls</span>':"")
    +(trail&&trail.baseUrl?'<span><a href="'+esc(trail.baseUrl)+'" target="_blank" rel="noopener" style="color:var(--indigo)">'+esc(trail.baseUrl)+'</a></span>':"")

  // Verdict pill + actions
  var actsEl=$("wheadActs")
  var cancelBtn=v==="running"?'<button class="btn btn-sm" id="cancelBtn" style="color:var(--rose)">'+window.kicon("x-circle",{size:12})+' Cancel</button>':''
  actsEl.innerHTML='<span class="pill '+esc(v)+'">'+esc(v)+'</span>'
    +'<a class="btn btn-sm" href="/api/trails/walks/'+esc(walkId)+'/report.pdf'+esc(qs)+'" target="_blank" rel="noopener">'+window.kicon('file-text',{size:12})+' PDF</a>'
    +'<button class="btn btn-sm" id="shareBtn">'+window.kicon("share-2",{size:12})+' Share</button>'
    +cancelBtn
  var shareBtn=$("shareBtn")
  if(shareBtn) shareBtn.onclick=function(){handleShare(walkId,qs)}
  var cbtn=$("cancelBtn")
  if(cbtn) cbtn.onclick=function(){handleCancel(walkId,qs)}

  // Steps sidebar
  replayState.steps=steps
  renderSteps(steps)

  // Findings + judgment. Load the project's Sims first so the judge-persona picker is populated.
  renderFindings(d.findings||[],qs)
  if(String(walk.status||"running")!=="running" && !_judgePersonas.length){ await loadJudgePersonas() }
  renderJudgment(d.judgment||null)

  // Replay
  if(d.hasReplay){
    loadReplay()
  } else if(v === "running") {
    $("replayBody").innerHTML='<div style="font-size:13px;color:var(--paper-faint);padding:20px 0;text-align:center">Walk in progress — replay will appear when it finishes.</div>'
  } else {
    showNoReplay("No replay was recorded for this Walk.")
  }

  // Live view + poll when still running
  if(v === "running"){
    startLive(walkId,qs)
    startRunningPoll(walkId, qs)
  }
}

// Poll /progress for a running walk until it reaches a terminal state, then reload.
// Grace window: 80 × 1.5 s fast phase, then up to 90 s at 3 s to survive the finalization
// window that occurs when the server writes the terminal status after the walk deadline fires.
var _activePoll = false
function startRunningPoll(runId, qs){
  if(_activePoll) return
  _activePoll = true
  var GRACE_MS = 90_000
  var graceStarted = 0
  ;(async function(){
    for(var i = 0; _activePoll; i++){
      var inGrace = i >= 80
      await new Promise(function(res){ setTimeout(res, inGrace ? 3000 : 1500) })
      if(inGrace && graceStarted === 0) graceStarted = Date.now()
      var prog = null
      try{
        var pr = await fetch("/api/trails/walks/"+encodeURIComponent(runId)+"/progress"+qs)
        if(pr.ok) prog = await pr.json().catch(function(){ return null })
      }catch(e){}
      if(prog && prog.status !== "running"){
        _activePoll = false
        await load()  // full reload to paint verdict pill, steps, replay
        return
      }
      if(inGrace && Date.now() - graceStarted > GRACE_MS){ _activePoll = false; break }
    }
  })()
}

function renderSteps(steps){
  var el=$("stepList")
  if(!steps||!steps.length){el.innerHTML='<div style="font-size:13px;color:var(--paper-faint)">No steps recorded.</div>';return}
  el.innerHTML=""
  steps.forEach(function(s){
    var v=String(s.verdict||"skip")
    var ev=s.evidence||{}
    var label=ev.action||ev.checkpoint||ev.rationale||""
    var shortLabel=String(label).slice(0,42)||(v)
    var item=document.createElement("div")
    item.className="step-item"
    item.innerHTML='<span class="step-idx">#'+esc(s.idx)+'</span>'
      +'<span class="step-dot '+esc(v)+'"></span>'
      +'<span class="step-txt" title="'+esc(String(label))+'">'+esc(shortLabel)+'</span>'
    item.onclick=function(){
      document.querySelectorAll(".step-item").forEach(function(x){x.classList.remove("on")})
      item.classList.add("on")
      showStepDetail(s)
    }
    el.appendChild(item)
  })
}

function showStepDetail(s){
  var d=$("stepDetail"), b=$("stepDetailBody"), h=$("stepDetailH2")
  d.style.display=""
  h.textContent="Step #"+s.idx+" — "+String(s.verdict||"skip")
  var ev=s.evidence||{}
  var rationale=ev.rationale||""
  var action=ev.action||""
  var fromSel=ev.fromSelector, toSel=ev.toSelector
  var v=String(s.verdict||"skip")
  var qs=projParam()?"?project="+encodeURIComponent(projParam()):"";
  var html='<div class="step-card">'
    +'<div class="sr"><span class="si">Step #'+esc(s.idx)+'</span>'
    +'<span class="sv '+esc(v)+'">'+esc(v)+'</span>'
    +(s.confidence!=null?'<span class="sconf">conf '+esc(s.confidence)+'</span>':"")
    +'</div>'
  if(action) html+='<div class="srat" style="font-family:var(--mono);font-size:11px;color:var(--paper-faint);margin-bottom:6px">'+esc(action)+'</div>'
  if(rationale) html+='<div class="srat">'+esc(rationale)+'</div>'
  if(fromSel||toSel) html+='<div class="sdiff">'+esc(fromSel||"(none)")+window.kicon("chevron-right",{size:9})+' '+esc(toSel||"(none)")+'</div>'
  if(ev.screenshotKey) html+='<img class="sshot" src="/api/trails/walks/'+esc(walkId)+'/steps/'+esc(s.id)+'/screenshot'+esc(qs)+'" alt="Step screenshot" loading="lazy"/>'
  html+='</div>'
  b.innerHTML=html
  d.scrollIntoView({behavior:"smooth",block:"nearest"})
}
