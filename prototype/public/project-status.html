<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Project Status — Klavity</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13;
      --surface: #17171d;
      --surface2: #1e1e26;
      --border: rgba(255,255,255,0.07);
      --text: #e8e8f0;
      --muted: rgba(232,232,240,0.5);
      --accent: #8b5cf6;
      --accent2: #a78bfa;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --radius: 10px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    a { color: var(--accent2); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Layout ── */
    .header {
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: -0.01em;
      color: var(--text);
      text-decoration: none;
    }
    .logo svg { flex-shrink: 0; }
    .header-divider { width: 1px; height: 20px; background: var(--border); }
    .header-project-name {
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 500;
    }
    .header-badge {
      margin-left: auto;
      background: rgba(139,92,246,0.15);
      color: var(--accent2);
      border: 1px solid rgba(139,92,246,0.3);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .main {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .page-title {
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 4px;
    }
    .page-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 36px;
    }
    .generated-at { font-size: 0.8rem; color: var(--muted); margin-top: 6px; }

    /* ── Section ── */
    .section { margin-bottom: 40px; }
    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 36px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      transition: border-color 150ms ease;
    }
    .stat-card:hover { border-color: rgba(139,92,246,0.35); }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-label {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 500;
    }
    .stat-card.green .stat-value { color: var(--green); }
    .stat-card.amber .stat-value { color: var(--amber); }
    .stat-card.purple .stat-value { color: var(--accent2); }

    /* ── Trail health table ── */
    .trails-list { display: flex; flex-direction: column; gap: 10px; }
    .trail-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 16px;
      transition: border-color 150ms ease;
    }
    .trail-row:hover { border-color: rgba(139,92,246,0.35); }
    .trail-name { font-weight: 500; font-size: 0.95rem; }
    .trail-runs { color: var(--muted); font-size: 0.8rem; }
    .trail-last { color: var(--muted); font-size: 0.8rem; text-align: right; }
    .verdict-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .verdict-pill.green { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
    .verdict-pill.amber { background: rgba(245,158,11,0.12); color: var(--amber); border: 1px solid rgba(245,158,11,0.25); }
    .verdict-pill.red   { background: rgba(239,68,68,0.12);  color: var(--red);   border: 1px solid rgba(239,68,68,0.25); }
    .verdict-pill.none  { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .green .dot { background: var(--green); }
    .amber .dot { background: var(--amber); }
    .red   .dot { background: var(--red); }
    .none  .dot { background: var(--muted); }

    /* ── Overall health badge ── */
    .health-banner {
      border-radius: var(--radius);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
      border: 1px solid;
    }
    .health-banner.green { background: rgba(34,197,94,0.07); border-color: rgba(34,197,94,0.25); }
    .health-banner.amber { background: rgba(245,158,11,0.07); border-color: rgba(245,158,11,0.25); }
    .health-banner.red   { background: rgba(239,68,68,0.07); border-color: rgba(239,68,68,0.25); }
    .health-banner.none  { background: var(--surface2); border-color: var(--border); }
    .health-icon { font-size: 1.8rem; line-height: 1; }
    .health-title { font-size: 1.1rem; font-weight: 700; }
    .health-banner.green .health-title { color: var(--green); }
    .health-banner.amber .health-title { color: var(--amber); }
    .health-banner.red .health-title   { color: var(--red); }
    .health-banner.none .health-title  { color: var(--muted); }
    .health-desc { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

    /* ── Activity feed ── */
    .activity-list { display: flex; flex-direction: column; gap: 8px; }
    .activity-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .activity-label { font-size: 0.875rem; font-weight: 500; flex: 1; }
    .activity-time { font-size: 0.75rem; color: var(--muted); flex-shrink: 0; }

    /* ── Empty states ── */
    .empty { color: var(--muted); font-size: 0.875rem; font-style: italic; padding: 12px 0; }

    /* ── Footer ── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 60px;
    }
    .footer a { color: var(--accent2); }

    /* ── Loading / error ── */
    .loading { text-align: center; padding: 80px 24px; color: var(--muted); }
    .error-state { text-align: center; padding: 80px 24px; }
    .error-state h1 { font-size: 3rem; font-weight: 800; color: var(--muted); margin-bottom: 8px; }
    .error-state p { color: var(--muted); }

    @media (max-width: 540px) {
      .trail-row { grid-template-columns: 1fr; gap: 8px; }
      .trail-last { text-align: left; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header class="header">
  <a href="https://klavity.in" class="logo" target="_blank" rel="noopener">
    <svg width="22" height="22" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="8" fill="#8b5cf6"/>
      <path d="M8 8h4v16H8V8zm6 8 6-8h5L13 18l12 6h-5L14 16z" fill="white"/>
    </svg>
    Klavity
  </a>
  <div class="header-divider"></div>
  <span class="header-project-name" id="headerProjectName">Loading…</span>
  <span class="header-badge">Status Portal</span>
</header>

<main class="main" id="main">
  <div class="loading">Loading project status…</div>
</main>

<footer class="footer">
  Powered by <a href="https://klavity.in" target="_blank" rel="noopener">Klavity</a> —
  AI-powered quality assurance for product teams.
  <br><small>This page is read-only and shared via a private link. It does not expose any account internals.</small>
</footer>

<script>
(async () => {
  const main = document.getElementById('main')
  const headerProjectName = document.getElementById('headerProjectName')

  // Extract token from URL: /shared/project/<token>
  const token = location.pathname.split('/shared/project/')[1]?.split('/')[0] || ''
  if (!token) {
    showError()
    return
  }

  let data
  try {
    const res = await fetch('/shared/project/' + token + '/data')
    if (!res.ok) { showError(res.status === 404 ? 'notfound' : 'error'); return }
    data = await res.json()
  } catch {
    showError('error')
    return
  }

  document.title = data.projectName + ' Status — Klavity'
  headerProjectName.textContent = data.projectName

  // Compute overall health
  const trails = data.trails || []
  const recentActivity = data.recentActivity || []
  const counts = data.counts || {}

  let overallHealth = 'none'
  if (trails.length > 0) {
    const hasRed   = trails.some(t => t.health === 'red')
    const hasAmber = trails.some(t => t.health === 'amber')
    const hasGreen = trails.some(t => t.health === 'green')
    const allNone  = trails.every(t => t.health === 'none')
    if (allNone) overallHealth = 'none'
    else if (hasRed) overallHealth = 'red'
    else if (hasAmber) overallHealth = 'amber'
    else if (hasGreen) overallHealth = 'green'
    else overallHealth = 'none'
  }

  const healthLabels = {
    green: { icon: '✅', title: 'All systems healthy', desc: 'All guarded flows are passing. No active regressions.' },
    amber: { icon: '⚠️', title: 'Attention needed', desc: 'Some flows have warnings. Review the guarded flows below.' },
    red:   { icon: '🔴', title: 'Issues detected', desc: 'One or more guarded flows are failing. Immediate attention recommended.' },
    none:  { icon: '⬜', title: 'No data yet', desc: 'No AutoSim runs completed yet. Status will appear after the first run.' },
  }
  const h = healthLabels[overallHealth] || healthLabels.none

  function reltime(ms) {
    if (!ms) return '—'
    const diff = Date.now() - ms
    const s = Math.floor(diff / 1000)
    if (s < 60) return 'just now'
    if (s < 3600) return Math.floor(s/60) + 'm ago'
    if (s < 86400) return Math.floor(s/3600) + 'h ago'
    if (s < 86400*7) return Math.floor(s/86400) + 'd ago'
    return new Date(ms).toLocaleDateString(undefined, { month:'short', day:'numeric' })
  }

  function verdictLabel(v) {
    return v === 'green' ? 'Passing' : v === 'amber' ? 'Warning' : v === 'red' ? 'Failing' : 'No runs'
  }

  // Build HTML
  const trailRows = trails.length === 0
    ? `<p class="empty">No AutoSim trails configured yet.</p>`
    : trails.map(t => `
      <div class="trail-row">
        <div>
          <div class="trail-name">${esc(t.trailName)}</div>
          <div class="trail-runs">${t.totalRuns} run${t.totalRuns !== 1 ? 's' : ''}</div>
        </div>
        <span class="verdict-pill ${t.health}"><span class="dot"></span>${verdictLabel(t.health)}</span>
        <div class="trail-last">${t.lastRunAt ? reltime(t.lastRunAt) : '—'}</div>
      </div>
    `).join('')

  const activityRows = recentActivity.length === 0
    ? `<p class="empty">No recent activity in the last 14 days.</p>`
    : recentActivity.map(a => `
      <div class="activity-item">
        <span class="verdict-pill ${a.verdict}" style="min-width:80px;justify-content:center"><span class="dot"></span>${verdictLabel(a.verdict)}</span>
        <span class="activity-label">${esc(a.label)}</span>
        <span class="activity-time">${reltime(a.runAt)}</span>
      </div>
    `).join('')

  const generatedAt = new Date(data.generatedAt).toLocaleString(undefined, {
    dateStyle: 'medium', timeStyle: 'short'
  })

  main.innerHTML = `
    <h1 class="page-title">${esc(data.projectName)}</h1>
    <p class="page-subtitle">Project quality status — shared via private link</p>
    <p class="generated-at">Last refreshed: ${generatedAt}</p>

    <div style="margin-top:28px"></div>
    <div class="health-banner ${overallHealth}">
      <div class="health-icon">${h.icon}</div>
      <div>
        <div class="health-title">${h.title}</div>
        <div class="health-desc">${h.desc}</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value">${counts.bugsReported ?? 0}</div>
        <div class="stat-label">Bugs reported</div>
      </div>
      <div class="stat-card green">
        <div class="stat-value">${counts.bugsResolved ?? 0}</div>
        <div class="stat-label">Bugs resolved</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-value">${counts.regressionsFound ?? 0}</div>
        <div class="stat-label">Regressions found</div>
      </div>
      <div class="stat-card ${(counts.openFindings ?? 0) > 0 ? 'amber' : ''}">
        <div class="stat-value">${counts.openFindings ?? 0}</div>
        <div class="stat-label">Open findings</div>
      </div>
      <div class="stat-card ${(counts.recurringIssues ?? 0) > 0 ? 'amber' : ''}">
        <div class="stat-value">${counts.recurringIssues ?? 0}</div>
        <div class="stat-label">Recurring issues</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${trails.length}</div>
        <div class="stat-label">Guarded flows</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Guarded Flow Health</div>
      <div class="trails-list">${trailRows}</div>
    </div>

    <div class="section">
      <div class="section-title">Recent AutoSim Activity (last 14 days)</div>
      <div class="activity-list">${activityRows}</div>
    </div>
  `

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  function showError(type) {
    headerProjectName.textContent = type === 'notfound' ? 'Not found' : 'Error'
    document.title = 'Not Found — Klavity'
    main.innerHTML = `
      <div class="error-state">
        <h1>${type === 'notfound' ? '404' : '500'}</h1>
        <p>${type === 'notfound' ? 'This status page could not be found. The link may have been revoked or is invalid.' : 'Failed to load status data. Please try again.'}</p>
      </div>
    `
  }
})()

// Local esc for top-level showError (hoisted)
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
function showError(type) {
  const h = document.getElementById('headerProjectName')
  if (h) h.textContent = type === 'notfound' ? 'Not found' : 'Error'
  document.title = 'Not Found — Klavity'
  const main = document.getElementById('main')
  if (main) main.innerHTML = `
    <div class="error-state">
      <h1>${type === 'notfound' ? '404' : '500'}</h1>
      <p>${type === 'notfound' ? 'This status page could not be found. The link may have been revoked or is invalid.' : 'Failed to load status data. Please try again.'}</p>
    </div>
  `
}
</script>
</body>
</html>
