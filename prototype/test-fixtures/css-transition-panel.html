<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS transition panel — 6s animated reveal</title>
  <style>
    .step[data-s="1"] { display: none; }
  </style>
</head>
<body>
  <div class="step" data-s="0">
    <button id="next" onclick="go(1)">Next</button>
  </div>
  <div class="step" data-s="1">
    <input id="name" aria-label="Full name" type="text">
  </div>
  <script>
    function go(n) {
      var panel = document.querySelector('.step[data-s="' + n + '"]')
      if (!panel) return
      // Simulate a 6-second animated reveal via the Web Animations API.
      // document.getAnimations() sees this as a running animation (playState='running'),
      // so the runner's waitForAnimationSettle waits it out (KLA-67 adaptive settle).
      var anim = panel.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 6000 })
      anim.onfinish = function() {
        panel.style.display = 'block'
      }
    }
  </script>
</body>
</html>
