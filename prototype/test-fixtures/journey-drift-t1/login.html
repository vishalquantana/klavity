<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Klavity Journey — Login</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; }
    button { padding: .5rem 1rem; }
  </style>
</head>
<body>
  <main>
    <h1>Sign in</h1>
    <form id="login-form" action="products.html" method="get">
      <label>Email
        <input id="email" type="email" aria-label="Email" data-testid="email-input" required />
      </label>
      <label>Password
        <input id="password" type="password" aria-label="Password" data-testid="password-input" />
      </label>
      <button id="signin" class="btn-primary" type="submit" role="button" aria-label="Sign in" data-testid="signin-btn">
        Sign in
      </button>
    </form>
  </main>
</body>
</html>
