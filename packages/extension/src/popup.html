<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    /* ── Theme tokens (LIGHT default) ── */
    :root{
      --ink:#f5f3ee; --ink-2:#ffffff; --ink-3:#efeae0;
      --paper:#19140f; --paper-dim:#574f45; --paper-faint:#8a8076;
      --line:rgba(25,20,15,.12);
      --indigo:#6366f1; --indigo-deep:#4f46e5;
      --amber:#d98324; --rose:#db2777; --green:#0f9d6b;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:system-ui,-apple-system,sans-serif;background:var(--ink);color:var(--paper);width:320px;min-height:200px;}

    /* ── Header ── */
    .header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:1px solid var(--line);}
    .header-left{display:flex;align-items:center;gap:8px;}
    .logo{font-size:18px;font-weight:800;color:var(--paper);letter-spacing:-.3px;display:flex;align-items:center;gap:7px;}
    .logo span{color:var(--indigo);}
    .status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;}
    .status-dot.warn{background:var(--amber);}
    .status-dot.err{background:#E94F37;}
    .status-label{font-size:11px;color:var(--paper-faint);}
    .settings-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border:none;background:var(--ink-3);border-radius:7px;cursor:pointer;color:var(--paper-dim);transition:background .12s;}
    .settings-btn:hover{background:var(--line);color:var(--paper);}

    /* ── Quick actions ── */
    .actions{display:flex;gap:8px;padding:12px 16px;}
    .action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:10px 8px;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;transition:opacity .12s;}
    .action-btn:hover{opacity:.88;}
    .action-bug{background:#E94F37;color:#fff;}
    .action-feat{background:var(--ink-3);color:var(--indigo-deep);border:1px solid var(--line);}
    .action-analyze{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;padding:10px;border:1px solid var(--line);border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;background:var(--indigo);color:#fff;}
    .action-analyze:hover{opacity:.9;}
    .action-analyze:disabled{opacity:.5;cursor:default;background:var(--ink-3);color:var(--paper-faint);}
    .action-analyze.studio{background:var(--ink-3);color:var(--indigo-deep);}

    /* ── Section ── */
    .section{padding:0 16px 12px;}
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .section-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--paper-faint);}
    .section-action{font-size:11px;color:var(--indigo-deep);cursor:pointer;background:none;border:none;font-family:inherit;}
    .section-action:hover{color:var(--indigo);}
    .divider{height:1px;background:var(--line);margin:0 16px;}

    /* ── Sims list ── */
    .sim-row{display:flex;align-items:center;gap:10px;padding:7px 0;}
    .sim-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
    .sim-info{flex:1;min-width:0;}
    .sim-name{font-size:13px;font-weight:600;color:var(--paper);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .sim-role{font-size:11px;color:var(--paper-faint);}
    .toggle{position:relative;width:36px;height:20px;flex-shrink:0;}
    .toggle input{opacity:0;width:0;height:0;position:absolute;}
    .toggle-track{position:absolute;inset:0;border-radius:10px;background:var(--line);cursor:pointer;transition:background .2s;}
    .toggle input:checked + .toggle-track{background:var(--indigo);}
    .toggle-track::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s;}
    .toggle input:checked + .toggle-track::after{left:19px;}
    .empty-state{padding:10px 0;text-align:center;color:var(--paper-faint);font-size:12px;}
    .empty-link{color:var(--indigo-deep);text-decoration:none;font-size:12px;margin-top:2px;display:block;}
    .empty-link:hover{color:var(--indigo);}

    /* ── Recent list ── */
    .recent-row{display:flex;align-items:flex-start;gap:8px;padding:7px 4px;cursor:pointer;border-radius:8px;margin:1px -4px;transition:background .12s,transform .1s;user-select:none;}
    .recent-row:hover{background:var(--ink-3);transform:translateY(-1px);}
    .recent-row:active{transform:scale(.98);}
    .recent-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
    .recent-icon.bug{background:rgba(233,79,55,.15);}
    .recent-icon.feat{background:rgba(99,102,241,.15);}
    .recent-desc{flex:1;min-width:0;padding-right:6px;}
    .recent-text{font-size:12.5px;font-weight:500;color:var(--paper);line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .recent-meta{font-size:10.5px;color:var(--paper-faint);margin-top:2px;line-height:1.2;}
    .recent-key{font-size:10px;color:var(--indigo-deep);font-weight:700;flex-shrink:0;margin-top:4px;white-space:nowrap;letter-spacing:.02em;}

    /* ── Footer ── */
    .footer{display:flex;align-items:center;justify-content:center;padding:10px 16px;border-top:1px solid var(--line);}
    .footer a{font-size:12px;color:var(--paper-faint);text-decoration:none;display:flex;align-items:center;gap:4px;transition:color .12s;}
    .footer a:hover{color:var(--paper-dim);}

/* ── a11y: visible focus + reduced-motion (a11y audit fix) ── */
a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{outline:2px solid #89b4fa;outline-offset:2px;border-radius:5px}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}}
    /* ── Auth (signed-out) ── */
    .auth{padding:18px 16px;}
    .auth-logo{margin-bottom:12px;}
    .auth h2{font-size:15px;font-weight:700;margin-bottom:4px;}
    .auth .auth-tagline{color:var(--paper-dim);margin-bottom:10px;}
    .auth p{font-size:12px;color:var(--paper-faint);margin-bottom:14px;line-height:1.45;}
    .auth input{width:100%;padding:10px;border:1px solid var(--line);border-radius:9px;font-size:14px;background:var(--ink-2);color:var(--paper);margin-bottom:9px;}
    .auth .btn-primary{width:100%;padding:11px;border:none;border-radius:10px;background:var(--indigo);color:#fff;font-size:14px;font-weight:600;cursor:pointer;}
    .auth .btn-primary:disabled{opacity:.55;cursor:default;}
    .auth .btn-ghost{width:100%;padding:7px;border:none;border-radius:10px;background:transparent;color:var(--paper-faint);font-size:12px;cursor:pointer;margin-top:10px;}
    .auth .btn-ghost:hover{color:var(--paper-dim);}
    .auth .auth-err{color:#E94F37;font-size:12px;margin-top:8px;min-height:1em;}
    .auth .auth-code-actions{display:flex;gap:7px;justify-content:center;align-items:center;margin-top:11px;font-size:12px;color:var(--paper-faint);}
    .auth .auth-code-actions a{color:var(--indigo-deep);text-decoration:none;}
    .auth .auth-code-actions a:hover{color:var(--indigo);}
    .auth .auth-code-actions a.disabled{color:var(--paper-faint);pointer-events:none;cursor:default;}
    .auth .hidden{display:none;}
    .status-label.actionable{cursor:pointer;text-decoration:underline;text-underline-offset:2px;}
    .proj-select{font-size:11px;color:var(--paper-dim);background:var(--ink-3);border:1px solid var(--line);border-radius:7px;padding:3px 6px;max-width:130px;}
    .signout-btn{font-size:11px;color:var(--paper-faint);background:none;border:none;cursor:pointer;}
    .signout-btn:hover{color:var(--paper-dim);}
    .grant-card{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.25);border-radius:10px;padding:11px 12px;}
    .grant-txt{font-size:12px;color:var(--paper-dim);line-height:1.4;margin-bottom:9px;}
    .grant-btn{width:100%;padding:9px;border:none;border-radius:8px;background:var(--indigo);color:#fff;font-size:12.5px;font-weight:700;cursor:pointer;}
    .grant-btn:hover{opacity:.9;}
</style>
</head>
<body>
  <!-- Signed-out (auth) -->
  <div id="view-auth" class="auth" style="display:none;">
    <div class="logo auth-logo"><svg width="22" height="22" viewBox="0 0 48 48" style="border-radius:7px;display:block"><rect width="48" height="48" rx="11" fill="#161310"/><g fill="#fff"><circle cx="15" cy="9" r="2"/><circle cx="11" cy="16" r="2"/><circle cx="10" cy="24" r="2"/><circle cx="11" cy="32" r="2"/><circle cx="15" cy="39" r="2"/><circle cx="33" cy="9" r="2"/><circle cx="37" cy="16" r="2"/><circle cx="38" cy="24" r="2"/><circle cx="37" cy="32" r="2"/><circle cx="33" cy="39" r="2"/></g></svg><span>Klavity</span></div>
    <h2>Sign in to Klavity</h2>
    <p class="auth-tagline">AI testers — Sims — review your web pages and file bugs &amp; feature requests for you.</p>
    <p id="auth-sub">Checking your session…</p>
    <div id="auth-form" class="hidden">
      <input id="auth-email" type="email" placeholder="you@company.com" autocomplete="email" />
      <input id="auth-code" type="text" inputmode="numeric" placeholder="6-digit code" class="hidden" />
      <button id="auth-submit" class="btn-primary">Send code</button>
      <div id="auth-code-actions" class="auth-code-actions hidden">
        <a id="auth-resend" href="#">Resend code</a>
        <span>·</span>
        <a id="auth-change-email" href="#">Change email</a>
      </div>
      <button id="auth-silent" class="btn-ghost">Already signed in on the Klavity website? Continue</button>
      <div id="auth-err" class="auth-err"></div>
    </div>
  </div>

  <!-- Signed-in -->
  <div id="view-app" style="display:none;">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo"><svg width="22" height="22" viewBox="0 0 48 48" style="border-radius:7px;display:block"><rect width="48" height="48" rx="11" fill="#161310"/><g fill="#fff"><circle cx="15" cy="9" r="2"/><circle cx="11" cy="16" r="2"/><circle cx="10" cy="24" r="2"/><circle cx="11" cy="32" r="2"/><circle cx="15" cy="39" r="2"/><circle cx="33" cy="9" r="2"/><circle cx="37" cy="16" r="2"/><circle cx="38" cy="24" r="2"/><circle cx="37" cy="32" r="2"/><circle cx="33" cy="39" r="2"/></g></svg><span>Klavity</span></div>
      <span class="status-dot" id="status-dot"></span>
      <select class="proj-select" id="proj-select" style="display:none;"></select>
      <span class="status-label" id="status-label">Loading…</span>
    </div>
    <button class="settings-btn" id="open-options" title="Settings">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>

  <!-- Quick actions -->
  <div class="actions">
    <button class="action-btn action-bug" id="btn-bug">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m8 2 1.88 1.88M14.12 3.88 16 2M9 7.13v-1a3.003 3.003 0 1 1 6 0v1M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6Z"/></svg>
      Report a Bug
    </button>
    <button class="action-btn action-feat" id="btn-feat">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1V18h6v-1.2c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2Z"/></svg>
      Request Feature
    </button>
  </div>

  <div style="padding:0 16px 12px;">
    <button class="action-analyze" id="btn-analyze">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      Analyse with Sims
    </button>
    <div id="analyze-msg" style="display:none;margin-top:7px;font-size:12px;line-height:1.4;color:var(--paper-faint);"></div>
  </div>

  <div id="grant-wrap" style="display:none;padding:0 16px 12px;"></div>

  <div class="divider"></div>

  <!-- Sims -->
  <div class="section" style="padding-top:12px;">
    <div class="section-header">
      <span class="section-title">Sims</span>
      <button class="section-action" id="manage-sims">Manage →</button>
    </div>
    <div id="sims-list"></div>
  </div>

  <div class="divider"></div>

  <!-- Recent -->
  <div class="section" style="padding-top:12px;">
    <div class="section-header">
      <span class="section-title">Recent</span>
    </div>
    <div id="recent-list"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a id="tracker-link" href="#" target="_blank">
      Open tracker
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </a>
    <button class="signout-btn" id="signout-btn" style="margin-left:auto;">Sign out</button>
  </div>

  </div>
  <script type="module" src="./popup.ts"></script>
</body>
</html>
