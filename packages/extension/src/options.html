<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Klavity Snap Settings</title>
  <style>
    body{font-family:system-ui;background:#1e1e2e;color:#cdd6f4;padding:32px;max-width:560px;margin:0 auto;}
    h1{font-size:20px;margin-bottom:24px;}
    label{display:block;font-size:13px;color:#a6adc8;margin-bottom:4px;margin-top:16px;}
    input,select{width:100%;padding:8px 12px;background:#313244;color:#cdd6f4;border:1px solid #45475a;border-radius:6px;font-size:14px;box-sizing:border-box;}
    .section{background:#181825;border-radius:8px;padding:16px;margin-top:20px;}
    .section h2{font-size:14px;color:#89b4fa;margin:0 0 12px;}
    button#save{margin-top:24px;width:100%;padding:12px;background:#89b4fa;color:#1e1e2e;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;}
    #status{margin-top:12px;text-align:center;color:#a6e3a1;font-size:13px;}
    .cloud-section{background:#1e2a3a;border:1px solid rgba(137,180,250,.27);border-radius:8px;padding:16px;margin-top:24px;}
    small{font-size:11px;color:#a6adc8;}
    .urlpaste{border:1px dashed #89b4fa;background:#1a2230;}
    .urlpaste::placeholder{color:#6c7086;}
    .parsed{display:none;font-size:12px;color:#a6e3a1;margin-top:6px;}
    .parsed.show{display:block;}
    /* toggle switch */
    .switchrow{display:flex;align-items:center;gap:14px;}
    .switchrow .meta{flex:1;}
    .switchrow .meta strong{font-size:14px;color:#cdd6f4;}
    .switch{position:relative;display:inline-block;width:42px;height:24px;flex-shrink:0;}
    .switch input{opacity:0;width:0;height:0;}
    .slider{position:absolute;inset:0;background:#45475a;border-radius:24px;transition:.2s;cursor:pointer;}
    .slider::before{content:"";position:absolute;height:18px;width:18px;left:3px;top:3px;background:#cdd6f4;border-radius:50%;transition:.2s;}
    .switch input:checked + .slider{background:#89b4fa;}
    .switch input:checked + .slider::before{transform:translateX(18px);}
    #cloud-fields{margin-top:14px;}
    .btnrow{display:flex;gap:10px;margin-top:24px;}
    .secondary{flex:1;padding:11px;background:#313244;color:#cdd6f4;border:1px solid #45475a;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
    .secondary:hover{border-color:#89b4fa;}
    .secondary:disabled{opacity:.6;cursor:default;}
    .testresult{margin-top:12px;font-size:13px;line-height:1.5;min-height:18px;}
    .testresult.ok{color:#a6e3a1;}.testresult.err{color:#f38ba8;}
    .testresult a{color:#89b4fa;}
    button#save{margin-top:14px;transition:background .2s,box-shadow .2s;}
    button#save.dirty{background:#89b4fa;box-shadow:0 0 0 2px rgba(249,226,175,.55);}
    button#save.clean{background:#a6e3a1;color:#0d1117;}
    .savestate{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:12px;font-size:13px;font-weight:600;min-height:20px;}
    .savestate .dot{width:8px;height:8px;border-radius:50%;}
    .savestate.dirty{color:#f9e2af;} .savestate.dirty .dot{background:#f9e2af;animation:sb 1.2s ease-in-out infinite;}
    .savestate.saving{color:#a6adc8;font-weight:400;} .savestate.saving .dot{background:#a6adc8;}
    .savestate.saved{color:#a6e3a1;} .savestate.saved .dot{background:#a6e3a1;}
    @keyframes sb{0%,100%{opacity:1}50%{opacity:.3}}
  </style>
</head>
<body>
  <h1>⚡ Klavity Snap Settings</h1>

  <label>📋 Paste any tracker URL — auto-detects the tracker &amp; fills everything</label>
  <input id="smart-url" class="urlpaste" type="url" placeholder="GitHub / Jira / Plane project or issue URL">
  <span class="parsed" id="smart-url-ok"></span>

  <label>Active Integration</label>
  <select id="integration">
    <option value="jira">Jira</option>
    <option value="linear">Linear</option>
    <option value="github">GitHub Issues</option>
    <option value="plane">Plane</option>
  </select>

  <div class="section" id="jira-section">
    <h2>Jira</h2>
    <label>Base URL</label><input id="jira-baseUrl" type="url" placeholder="https://yourorg.atlassian.net">
    <label>Email</label><input id="jira-email" type="email">
    <label>API Token</label><input id="jira-token" type="password">
    <label>Project Key</label><input id="jira-projectKey" placeholder="PROJ">
  </div>

  <div class="section" id="linear-section" style="display:none">
    <h2>Linear</h2>
    <label>API Key</label><input id="linear-apiKey" type="password">
    <label>Team ID</label><input id="linear-teamId" placeholder="team_abc123">
  </div>

  <div class="section" id="github-section" style="display:none">
    <h2>GitHub Issues</h2>
    <label>Personal Access Token</label><input id="github-token" type="password">
    <label>Repository (owner/repo)</label><input id="github-repo" placeholder="acme/webapp">
    <small>Note: screenshots embedded in issue body. GitHub has no direct attachment API.</small>
  </div>

  <div class="section" id="plane-section" style="display:none">
    <h2>Plane</h2>
    <label>API Token</label><input id="plane-token" type="password">
    <label>Host <small>(self-hosted Plane, or leave as api.plane.so for cloud)</small></label>
    <input id="plane-host" type="url" placeholder="https://api.plane.so">
    <label>Workspace Slug</label><input id="plane-workspace" placeholder="acme">
    <label>Project ID</label><input id="plane-projectId" placeholder="proj_abc123">
  </div>

  <div class="cloud-section">
    <div class="switchrow">
      <div class="meta">
        <strong>☁️ Klavity Cloud</strong><br>
        <small>Off = file directly to the tracker above. On = route reports through a Klavity backend.</small>
      </div>
      <label class="switch"><input type="checkbox" id="cloudToggle"><span class="slider"></span></label>
    </div>
    <div id="cloud-fields" style="display:none">
      <label>Backend URL</label>
      <input id="backendUrl" type="url" placeholder="https://app.klav.io">
    </div>
  </div>

  <label style="margin-top:20px;display:flex;align-items:center;gap:8px;">
    <input type="checkbox" id="autoFileErrors" style="width:auto;">
    Auto-file silent tickets for unhandled JS errors
  </label>

  <div class="btnrow">
    <button type="button" id="test" class="secondary">🔌 Test Connection</button>
    <button type="button" id="testTicket" class="secondary">🎫 Insert Test Ticket</button>
  </div>
  <div id="testResult" class="testresult"></div>

  <button id="save">Save Settings</button>
  <div id="saveState" class="savestate"><span class="dot"></span><span id="saveStateText"></span></div>
  <script type="module" src="./options.ts"></script>
</body>
</html>
