name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly dependency audit — Mondays 09:00 UTC (CASA monthly dependency audit)
    - cron: "0 9 * * 1"

jobs:
  build-test:
    name: Build & Test (pnpm)
    # Skip on the scheduled trigger; the dependency-audit job covers that run.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # No `packageManager` field in package.json, so pin to v9.
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Emoji guard (report-only until conversion completes)
        run: node scripts/check-no-emoji.mjs --report

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

      - name: Dependency audit (fail on high/critical)
        run: pnpm audit --audit-level=high

  backend-test:
    name: Backend Test (Bun)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Run backend tests
        run: bun test
        working-directory: prototype

  dependency-audit:
    name: Scheduled Dependency Audit
    # Run on the weekly schedule (surface new advisories), plus manual dispatch.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Dependency audit (surface moderate+)
        run: pnpm audit --audit-level=moderate
